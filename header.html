<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MCSR Header</title>
<link rel="stylesheet" href="https://fonts.cdnfonts.com/css/minecraftia">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #18181b; color: #e4e4e7; font-family: "Minecraftia", monospace; font-size: 0.6rem; padding: 1rem; }
  .header { display: block; overflow: hidden; }
  .player-head { width: 5rem; height: 5rem; image-rendering: pixelated; float: left; margin-right: 0.75rem }
  .name-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.3rem; }
  .rank { color: rgba(255,255,255,0.5); font-size: 0.8rem; }
  .name { font-size: 1.4rem; color: white; }
  .flag { width: 3em; height: auto;}
  .elo { display: flex; align-items: center; gap: 0.1rem; transform: scale(1.5);transform-origin: left center;}
  .stat-row { display: flex; gap: 0.25rem; flex-wrap: wrap; color: rgba(255,255,255,0.5); margin-top: 0.5rem; }
  .stat-row b { color: rgba(255,255,255,0.7); }
</style>
</head>
<body>
<div class="header" id="header">Loading...</div>
<script>
const params   = new URLSearchParams(window.location.search);
const USERNAME = params.get('user')   || 'bombsan';
const SEASON   = parseInt(params.get('season')) || 10;

const TIERS = [
  { elo: 0, label: 'Coal I', iconX: 0, iconY: 0, color:'#AAA' },
  { elo: 400, label: 'Coal II', iconX: -15, iconY: 0, color:'#AAA' },
  { elo: 500, label: 'Coal III', iconX: -30, iconY: 0, color:'#AAA' },

  { elo: 600, label: 'Iron I', iconX: -45, iconY: 0, color:'#FFF' },
  { elo: 700, label: 'Iron II', iconX: -60, iconY: 0, color:'#FFF' },
  { elo: 800, label: 'Iron III', iconX: -75, iconY: 0, color:'#FFF' },

  { elo: 900, label: 'Gold I', iconX: 0, iconY: -15, color:'#FA0' },
  { elo: 1000, label: 'Gold II', iconX: -15, iconY: -15, color:'#FA0' },
  { elo: 1100, label: 'Gold III', iconX: -30, iconY: -15, color:'#FA0' },

  { elo: 1200, label: 'Emerald I', iconX: -45, iconY: -15, color:'#5F5' },
  { elo: 1300, label: 'Emerald II', iconX: -60, iconY: -15, color:'#5F5' },
  { elo: 1400, label: 'Emerald III', iconX: -75, iconY: -15, color:'#5F5' },

  { elo: 1500, label: 'Diamond I', iconX: 0, iconY: -30, color:'#5FF' },
  { elo: 1650, label: 'Diamond II', iconX: -15, iconY: -30, color:'#5FF' },
  { elo: 1800, label: 'Diamond III', iconX: -30, iconY: -30, color:'#5FF' },

  { elo: 2000, label: 'Netherite', iconX: -45, iconY: -30, color:'#FF5' },
];

function getTier(elo) {
  for (let i = TIERS.length - 1; i >= 0; i--) {
    if (elo >= TIERS[i].elo) return TIERS[i];
  }
  return TIERS[0];
}

function msToTime(ms) {
  if (!ms) return '—';
  const total = Math.floor(ms / 1000);
  const m = Math.floor(total / 60);
  const s = total % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

(async () => {
  const res = await fetch(`https://mcsrranked.com/api/users/${USERNAME}`);
  const { data } = await res.json();
  if (!data) return;

  const elo   = data.eloRate;
  const tier  = getTier(elo);
  const s     = data.statistics.season;
  const wins  = s.wins.ranked;
  const pb    = msToTime(s.bestTime.ranked);
  const winstreak = s.highestWinStreak.ranked;
  const winrate   = s.playedMatches.ranked > 0
    ? Math.round(wins / s.playedMatches.ranked * 100) : 0;

  const flagImg = data.country
    ? `<img class="flag" src="https://flagcdn.com/w40/${data.country}.png" alt="${data.country}">` : '';
  const headUrl = `https://mc-heads.net/avatar/${data.uuid}/64`;

  document.getElementById('header').innerHTML = `
    <img class="player-head" src="${headUrl}" alt="${data.nickname}">
    <div class="name-row">
      <span class="rank">#${data.eloRank}</span>
      ${flagImg}
      <span class="name">${data.nickname}</span>
    </div>
    <div class="elo">
      <div style="width:15px;height:15px;background-image:url(${RANK_SPRITE});background-repeat:no-repeat;image-rendering:pixelated;background-position:${tier.iconX}px ${tier.iconY}px;background-size:90px 45px;"></div>
      <span class="elo" style="color:${tier.color}">${tier.label} <span style="color:#ffffff">[</span><span style="color:${tier.color}">${elo}</span><span style="color:#ffffff">]</span></span>
    </div>
    <div class="stat-row">
      <span><b>${winrate}%</b> winrate</span>
      <span>•</span>
      <span><b>${pb}</b> pb</span>
      <span>•</span>
      <span><b>${winstreak}</b> best ws</span>
    </div>
  `;
})();
</script>
</body>
</html>
