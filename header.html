<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MCSR Header</title>
<link rel="stylesheet" href="https://fonts.cdnfonts.com/css/minecraftia">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #18181b; color: #e4e4e7; font-family: "Minecraftia", monospace; font-size: 0.6rem; padding: 1rem; }
  .header { display: block; overflow: hidden; }
  .player-head { width: 4rem; height: 4rem; image-rendering: pixelated; float: left; margin-right: 0.75rem; margin-bottom: 0.25rem; }
  .name-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.3rem; }
  .rank { color: rgba(255,255,255,0.3); font-size: 0.8rem; }
  .name { font-size: 1rem; color: white; }
  .flag { width: 1.2em; height: auto; border-radius: 2px; }
  .elo { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.3rem; flex-wrap: wrap; }
  .elo-value { font-size: 0.9rem; }
  .dot { color: rgba(255,255,255,0.3); }
  .peak { color: rgba(255,255,255,0.6); }
  .stat-row { display: flex; gap: 1rem; flex-wrap: wrap; color: rgba(255,255,255,0.5); margin-bottom: 0.3rem; }
  .stat-row b { color: rgba(255,255,255,0.7); }
</style>
</head>

function msToTime(ms) {
  if (!ms) return '—';
  const total = Math.floor(ms / 1000);
  const m = Math.floor(total / 60);
  const s = total % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function flagUrl(country) {
  if (!country) return null;
  return `https://flagcdn.com/w40/${country}.png`;

function getRank(elo) {
  return RANKS.find(r => elo >= r.min && elo <= r.max) || RANKS[0];
}

async function load() {
  const res = await fetch(`https://mcsrranked.com/api/users/${USERNAME}`);
  const { data } = await res.json();
  const s = data.statistics.season;
  const sr = data.seasonResult;

  const elo = data.eloRate;
  const rank = getRank(elo);
  const peak = sr.highest;
  const wins = s.wins.ranked;
  const losses = s.loses.ranked;
  const draws = s.playedMatches.ranked - wins - losses - s.forfeits.ranked;
  const winrate = s.playedMatches.ranked > 0 ? Math.round(wins / s.playedMatches.ranked * 100) : 0;
  const pb = msToTime(s.bestTime.ranked);
  const avgTime = s.completions.ranked > 0 ? msToTime(Math.floor(s.completionTime.ranked / s.completions.ranked)) : '—';
  const forfeitRate = s.playedMatches.ranked > 0 ? (s.forfeits.ranked / s.playedMatches.ranked * 100).toFixed(1) : '0';
  const winstreak = s.highestWinStreak.ranked;

  const flagImg = data.country ? `<img class="flag" src="${flagUrl(data.country)}" alt="${data.country}">` : '';
  const headUrl = `https://mc-heads.net/avatar/${data.uuid}/64`;

  document.getElementById('header').innerHTML = `
    <img class="player-head" src="${headUrl}" alt="${data.nickname}">
    <div class="name-row">
      <span class="rank">#${data.eloRank}</span>
      ${flagImg}
      <span class="name">${data.nickname}</span>
      <span class="dot">•</span>
      <span class="peak">${peak} peak elo</span>
    </div>
    <div class="elo">
      <img src="${rank.img}" style="width:1.4rem;height:1.4rem;image-rendering:pixelated;vertical-align:middle;">
      <span style="color:${rank.color}" class="elo-value">${rank.tier} ${rank.div > 0 ? ['I','II','III'][rank.div-1] : ''} (${elo} elo)</span>
    </div>
    <div class="stat-row">
      <span><b>${winrate}%</b> winrate</span>
      <span class="dot">•</span>
      <span><b>${pb}</b> pb</span>
      <span class="dot">•</span>
      <span><b>${winstreak}</b> best ws</span>
    </div>
    <div class="stat-row">
      <span><b>${avgTime}</b> average</span>
      <span class="dot">•</span>
      <span><b>${forfeitRate}%</b> forfeit rate</span>
      <span class="dot">•</span>
      <span><b>${wins}W ${losses}L ${draws}D</b></span>
    </div>
  `;
}

load();
</script>
</body>
</html>
