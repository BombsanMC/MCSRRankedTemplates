<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MCSR Ranked ELO Graph</title>
<link rel="stylesheet" href="https://fonts.cdnfonts.com/css/minecraftia">
<style>
  body { background: #18181b; color: #e4e4e7; font-family: "Minecraftia", sans-serif; font-size: 0.5rem; margin: 0; padding: 1rem; }
  #graph-container { width: 100%; max-width: 900px; }
  #graph { overflow: visible; }
</style>
</head>
<body>
<div id="graph-container">
  <svg id="graph" width="100%" viewBox="0 0 416 272" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const USERNAME = params.get('username') || 'bombsan';
const SEASON   = params.get('season')   || '11';

const TIERS = [
  { elo:    0, label: 'Coal I',      tier: 'Coal',      color: '#AAAAAA' },
  { elo:  400, label: 'Coal II',     tier: 'Coal',      color: '#AAAAAA' },
  { elo:  500, label: 'Coal III',    tier: 'Coal',      color: '#AAAAAA' },
  { elo:  600, label: 'Iron I',      tier: 'Iron',      color: '#FFFFFF' },
  { elo:  700, label: 'Iron II',     tier: 'Iron',      color: '#FFFFFF' },
  { elo:  800, label: 'Iron III',    tier: 'Iron',      color: '#FFFFFF' },
  { elo:  900, label: 'Gold I',      tier: 'Gold',      color: '#FFAA00' },
  { elo: 1000, label: 'Gold II',     tier: 'Gold',      color: '#FFAA00' },
  { elo: 1100, label: 'Gold III',    tier: 'Gold',      color: '#FFAA00' },
  { elo: 1200, label: 'Emerald I',   tier: 'Emerald',   color: '#55FF55' },
  { elo: 1300, label: 'Emerald II',  tier: 'Emerald',   color: '#55FF55' },
  { elo: 1400, label: 'Emerald III', tier: 'Emerald',   color: '#55FF55' },
  { elo: 1500, label: 'Diamond I',   tier: 'Diamond',   color: '#55FFFF' },
  { elo: 1650, label: 'Diamond II',  tier: 'Diamond',   color: '#55FFFF' },
  { elo: 1800, label: 'Diamond III', tier: 'Diamond',   color: '#55FFFF' },
  { elo: 2000, label: 'Netherite',   tier: 'Netherite', color: '#FFFF55' },
];

// Derive background bands: one rect per unique tier group
const TIER_BANDS = (() => {
  const bands = [];
  let i = 0;
  while (i < TIERS.length) {
    const { tier, color } = TIERS[i];
    const min = TIERS[i].elo;
    let j = i + 1;
    while (j < TIERS.length && TIERS[j].tier === tier) j++;
    const max = j < TIERS.length ? TIERS[j].elo : 9999;
    bands.push({ min, max, color });
    i = j;
  }
  return bands;
})();

function getTierColor(elo) {
  for (let i = TIERS.length - 1; i >= 0; i--) {
    if (elo >= TIERS[i].elo) return TIERS[i].color;
  }
  return TIERS[0].color;
}
// ──────────────────────────────────────────────────────────────────────────────

async function fetchAllRankedMatches(username, uuid, season, currentElo) {
  let allMatches = [];
  let beforeId = null;

  while (true) {
    let url = `https://mcsrranked.com/api/users/${username}/matches?type=2&season=${season}&sort=newest&count=100`;
    if (beforeId !== null) url += `&before=${beforeId}`;

    const res  = await fetch(url);
    const json = await res.json();
    if (!json.data || json.data.length === 0) break;

    for (const match of json.data) {
      const change = match.changes?.find(c => c.uuid === uuid);
      if (change && change.eloRate != null) {
        allMatches.push({ id: match.id, date: match.date, elo: change.eloRate });
      }
    }

    if (json.data.length < 100) break;
    beforeId = json.data[json.data.length - 1].id;
  }

  allMatches.sort((a, b) => a.date - b.date);

  if (currentElo != null && allMatches.length > 0) {
    const lastElo = allMatches[allMatches.length - 1].elo;
    if (currentElo !== lastElo) {
      allMatches.push({ id: null, date: allMatches[allMatches.length - 1].date + 1, elo: currentElo });
    }
  }

  return allMatches;
}

function drawGraph(data) {
  const svg = document.getElementById('graph');
  svg.innerHTML = '';

  const W = 416, H = 272;
  const n = data.length;
  const elos = data.map(d => d.elo);
  const peak = Math.max(...elos);

  const minElo = Math.floor((Math.min(...elos) - 50) / 200) * 200;
  const maxElo = Math.ceil((peak + 50) / 200) * 200;

  const xScale = i   => (i / (n - 1)) * W;
  const yScale = elo => H - ((elo - minElo) / (maxElo - minElo)) * H;

  // Tier background bands (derived from TIERS table)
  for (const tier of TIER_BANDS) {
    const yTop = yScale(Math.min(tier.max, maxElo));
    const yBot = yScale(Math.max(tier.min, minElo));
    if (yBot <= yTop) continue;
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', 0);
    rect.setAttribute('y', yTop);
    rect.setAttribute('width', W);
    rect.setAttribute('height', yBot - yTop);
    rect.setAttribute('fill', tier.color);
    rect.setAttribute('opacity', '0.08');
    svg.appendChild(rect);
  }

  // Grid lines (every 100 ELO)
  for (let elo = minElo; elo <= maxElo; elo += 100) {
    const y    = yScale(elo);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', 1); line.setAttribute('x2', W);
    line.setAttribute('y1', y); line.setAttribute('y2', y);
    line.setAttribute('stroke', 'rgba(255,255,255,0.1)');
    line.setAttribute('stroke-width', '1');
    svg.appendChild(line);
  }

  // Dark fill under the line
  let fillPath = `M${xScale(0)},0L${xScale(0)},${yScale(data[0].elo)}`;
  for (let i = 1; i < n; i++) fillPath += `L${xScale(i)},${yScale(data[i].elo)}`;
  fillPath += `L${xScale(n - 1)},0Z`;
  const fill = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  fill.setAttribute('d', fillPath);
  fill.setAttribute('fill', '#18181b');
  fill.setAttribute('opacity', '0.9');
  svg.appendChild(fill);

  // Peak dashed line
  const peakY    = yScale(peak);
  const peakLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  peakLine.setAttribute('x1', 0); peakLine.setAttribute('x2', W);
  peakLine.setAttribute('y1', peakY); peakLine.setAttribute('y2', peakY);
  peakLine.setAttribute('stroke', getTierColor(peak));
  peakLine.setAttribute('stroke-width', '1');
  peakLine.setAttribute('stroke-dasharray', '5 2');
  peakLine.setAttribute('opacity', '0.5');
  svg.appendChild(peakLine);

  // Colored line segments
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('stroke-width', '2');
  g.setAttribute('stroke-linecap', 'round');
  for (let i = 1; i < n; i++) {
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', xScale(i - 1)); line.setAttribute('y1', yScale(data[i - 1].elo));
    line.setAttribute('x2', xScale(i));     line.setAttribute('y2', yScale(data[i].elo));
    line.setAttribute('stroke', getTierColor(data[i].elo));
    g.appendChild(line);
  }
  svg.appendChild(g);

  // Dot at last point
  const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  dot.setAttribute('cx', xScale(n - 1));
  dot.setAttribute('cy', yScale(data[n - 1].elo));
  dot.setAttribute('r', '3');
  dot.setAttribute('fill', getTierColor(data[n - 1].elo));
  svg.appendChild(dot);

  // Tier labels on left (derived from TIERS table)
  for (const tl of TIERS) {
    if (tl.elo < minElo || tl.elo > maxElo) continue;
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', 2);
    text.setAttribute('y', yScale(tl.elo) + 4);
    text.setAttribute('text-anchor', 'start');
    text.setAttribute('font-size', '7');
    text.setAttribute('font-family', 'Minecraftia, sans-serif');
    text.setAttribute('fill', tl.color);
    text.textContent = `${tl.elo} • ${tl.label}`;
    svg.appendChild(text);
  }

  // Peak label
  const peakLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  peakLabel.setAttribute('x', W - 2);
  peakLabel.setAttribute('y', peakY - 3);
  peakLabel.setAttribute('text-anchor', 'end');
  peakLabel.setAttribute('font-size', '10');
  peakLabel.setAttribute('fill', getTierColor(peak));
  peakLabel.setAttribute('opacity', '0.75');
  peakLabel.textContent = `${peak} • Peak Elo`;
  svg.appendChild(peakLabel);
}

(async () => {
  const userRes  = await fetch(`https://mcsrranked.com/api/users/${USERNAME}`);
  const userData = await userRes.json();
  if (!userData.data) return;

  const { uuid, eloRate } = userData.data;
  const matches = await fetchAllRankedMatches(USERNAME, uuid, SEASON, eloRate);
  if (matches.length > 0) drawGraph(matches);
})();
</script>
</body>
</html>
