<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>MCSR Badges</title>

  <link
    rel="stylesheet"
    href="https://fonts.cdnfonts.com/css/minecraftia"
  />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #18181b;
      padding: 1rem;
      font-family: "Minecraftia", monospace;
    }

    .badges {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: .5rem;
    }

    .badge img {
      width: 3rem;
      height: 3rem;
      image-rendering: pixelated;
    }
  </style>
</head>

<body>

  <div id="root"></div>

  <script>
    const user =
      new URLSearchParams(location.search).get('user')
      || 'bombsan';

    const base =
      'https://raw.githubusercontent.com/MCSR-Ranked/Wiki/main/docs/gameplay/img/achievement/';

    const map = {

      // leveled
      bestTime:         ['Break the Barrier',      l => `break_the_barrier_level_${l}.png`],
      highestWinStreak: ['Consistent Wins',        l => `consistent_wins_level_${l}.png`],
      playedMatches:    ['Match Master',           l => `match_master_level_${l}.png`],
      playtime:         ['Practice Makes Perfect', l => `practice_makes_perfect_level_${l}.png`],
      wins:             ['W Collector',            l => `w_collector_level_${l}.png`],

      // one-time
      armorless:    ['GIGACHAD',               () => 'gigachad.png'],
      ironPickless: ["It Isn't Iron Pick",     () => 'it_isnt_iron_pick.png'],
      netherite:    ['Smithing Time',          () => 'smithing_time.png'],
      ironHoe:      ['Farming Time',           () => 'farming_time.png'],
      highLevel:    ['Too Many Levels',        () => 'too_many_levels.png'],
      egapHolder:   ['Valuable Artifact',      () => 'valuable_artifact.png'],
      classicRun:   ['Classic',                () => 'classic.png'],
      overtake:     ['Never. Give. Up.',       () => 'never_give_up.png'],
      summonWither: ['Wrong Category',         () => 'wrong_category.png'],
      foodless:     ['A Limited Diet',         () => 'a_limited_diet.png'],
      oneshot:      ['You Only Get One Shot',  () => 'you_only_get_one_shot.png'],
    };

    const badge = a => {
      const m = map[a.id];
      if (!m) return '';
      const [name, file] = m;
      return `<div class="badge"><img src="${base + file(a.level)}"/></div>`;
    };

    fetch(`https://mcsrranked.com/api/users/${user}`)
      .then(r => r.json())
      .then(({ data }) => {

        const badges = [
          ...data.achievements.display,
          ...data.achievements.total
        ];

	badges.sort((a, b) => (b.level || 0) - (a.level || 0));

        root.innerHTML = `
          <div class="badges">
            ${badges.map(badge).join('')}
          </div>
        `;
      });
  </script>

</body>

</html>
